services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-agents-postgres
    environment:
      POSTGRES_DB: ai_agents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-agents-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: ai-agents-backend
    environment:
      # LLM Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      
      # Models
      CREATOR_MODEL: gpt-4-turbo
      CRITIC_MODEL: gpt-4-turbo
      RADICAL_MODEL: gpt-4
      SYNTHESIZER_MODEL: gpt-3.5-turbo
      JUDGE_MODEL: gpt-4
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_agents
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: 10
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Vector Store
      VECTOR_DB_PATH: /app/data/vector_store
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ai-agents-network
